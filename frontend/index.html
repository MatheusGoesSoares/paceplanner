<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/logo.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <title>PacePlanner</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header>
      <img src="icons/header-logo.png" alt="PacePlanner" class="header-logo" />
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo treino</h2>

        <form id="run-form">
          <input type="hidden" id="run-id" />

          <div class="mb-3">
            <label for="title" class="form-label">Título do treino</label>
            <input type="text" id="title" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="distance" class="form-label">Distância (km)</label>
            <input type="number" id="distance" class="form-control" step="0.1" required />
          </div>

          <div class="mb-3">
            <label for="duration" class="form-label">Duração (minutos)</label>
            <input type="number" id="duration" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="pace" class="form-label">Pace (min/km)</label>
            <input type="text" id="pace" class="form-control" placeholder="Ex: 5:30" required />
          </div>

          <div class="mb-3">
            <label for="date" class="form-label">Data do treino</label>
            <input type="date" id="date" class="form-control" required />
          </div>

          <div class="mb-3">
            <label for="location" class="form-label">Localização</label>
            <div class="d-flex gap-2 flex-wrap">
              <input
                type="text"
                id="location"
                class="form-control"
                placeholder="Clique para obter localização"
                readonly
              />
              <button type="button" id="get-location" class="btn btn-outline-primary">
                Usar localização
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label for="notes" class="form-label">Observações</label>
            <textarea id="notes" rows="4" class="form-control"></textarea>
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">
              Cancelar edição
            </button>
            <button type="button" id="open-history" class="btn btn-outline-secondary">
              Ver histórico
            </button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0"></p>
      </div>
    </section>
  </div>

  <div id="history-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Histórico de corridas</h3>
        <button type="button" id="close-history" class="modal-close-btn">×</button>
      </div>

      <div class="modal-actions">
        <button id="reload-btn" type="button" class="small-btn">Atualizar</button>
      </div>

      <div id="runs-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
